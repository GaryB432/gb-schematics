name: Preview Release
on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Added permissions so pkg-pr-new can post the preview installation links directly to your PR comments
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      - run: pnpm dlx pkg-pr-new publish './packages/*'
