name: CI with pnpm

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          run_install: |
            - recursive: true
              args: [--strict-peer-dependencies]
            - args: [--global, typescript]

      - run: pnpm -r test
